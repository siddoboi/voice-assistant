# dev_config.yaml — WSL2 development environment configuration.
#
# Audio device selection for the WSL2 host. WSL2 typically does not have
# direct access to host microphones, so input_device is null by default
# (record() will raise a clear error if called without an override).
# Tests use pre-recorded .wav files and do not require a live device.
#
# When the Pi arrives, configs/pi_config.yaml will mirror this schema
# with concrete device indices for the USB audio adapter.

audio:
  # Sample rate used for all in-pipeline audio (Hz). Telephony 8kHz audio
  # is resampled to this rate via audio_io.resample_8_to_16k().
  sample_rate: 16000

  # Telephony / SIP source sample rate (Hz). Used by resample_8_to_16k().
  telephony_sample_rate: 8000

  # Single channel — all pipeline audio is mono.
  channels: 1

  # 16-bit PCM. sounddevice float32 is used in-memory; .wav files are
  # written as int16 to keep them compatible with faster-whisper and Piper.
  dtype: int16

  # Input device. null = sounddevice default. On WSL2 this is typically
  # unset; tests do not exercise live recording.
  input_device: null

  # Output device. null = sounddevice default. play() will fall back to
  # the system default if this is null.
  output_device: null

  # Default recording duration in seconds when caller does not pass one.
  # Used by the Day 3 hardcoded-5s pipeline.
  default_record_duration_sec: 5.0

paths:
  # All recordings are written here; this directory is gitignored.
  recordings_dir: recordings